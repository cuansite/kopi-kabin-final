<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Compression Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .test-container { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .result { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .pass { background: #d4edda; color: #155724; }
    .fail { background: #f8d7da; color: #721c24; }
    input[type="file"] { margin: 10px 0; }
    button { padding: 10px 20px; background: #0000E9; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0000CC; }
    #preview { max-width: 300px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Image Compression Test Suite</h1>

  <div class="test-container">
    <h2>Test 1: File Upload & Compression</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="testCompression()">Test Compression</button>
    <div id="results"></div>
    <img id="preview" alt="Compressed preview">
  </div>

  <script>
    async function compressImageToBase64(file, maxWidth = 500, maxHeight = 500, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            if (!ctx) {
              reject(new Error('Failed to get canvas context'));
              return;
            }

            ctx.drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            const base64 = dataUrl.split(',')[1];
            resolve({base64, dataUrl, width, height});
          };

          img.onerror = () => reject(new Error('Failed to load image'));
          img.src = e.target?.result;
        };

        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
      });
    }

    async function testCompression() {
      const fileInput = document.getElementById('fileInput');
      const resultsDiv = document.getElementById('results');
      const preview = document.getElementById('preview');

      if (!fileInput.files[0]) {
        resultsDiv.innerHTML = '<div class="result fail">✗ No file selected</div>';
        return;
      }

      const file = fileInput.files[0];
      const originalFile = file;

      try {
        const startTime = performance.now();
        const result = await compressImageToBase64(file);
        const endTime = performance.now();

        const originalSize = file.size;
        const compressedBase64Size = result.base64.length;
        const compressionRatio = ((1 - (compressedBase64Size / (originalSize * 4 / 3))) * 100).toFixed(1);

        let html = `
          <div class="result pass">
            <strong>✓ Compression Successful</strong><br>
            Original file: ${(originalSize / 1024).toFixed(2)} KB<br>
            Original Base64: ${(originalSize * 4 / 3 / 1024).toFixed(2)} KB<br>
            Compressed Base64: ${(compressedBase64Size / 1024).toFixed(2)} KB<br>
            Compression ratio: ${compressionRatio}%<br>
            New dimensions: ${result.width}x${result.height}px<br>
            Processing time: ${(endTime - startTime).toFixed(2)}ms
          </div>
        `;

        if (compressedBase64Size < 1000000) {
          html += '<div class="result pass">✓ Payload size acceptable (&lt; 1MB)</div>';
        } else {
          html += '<div class="result fail">✗ Payload too large (&gt; 1MB)</div>';
        }

        resultsDiv.innerHTML = html;
        preview.src = result.dataUrl;
      } catch (err) {
        resultsDiv.innerHTML = `<div class="result fail">✗ Error: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
